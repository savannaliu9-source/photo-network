<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观察日记</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --glass-bg: rgba(152, 216, 200, 0.35);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --mint-blue: #98D8C8;
        }
        
        body {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            background: linear-gradient(180deg, #b3fbec 0%, #dffcf8 50%, #e8ddd4 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1;
        }
        
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 15% 20%, rgba(255, 240, 245, 0.7) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(245, 235, 220, 0.7) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 250, 245, 0.5) 0%, transparent 70%);
            z-index: -1;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 12px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            color: #2d2d2d;
            letter-spacing: 2px;
        }
        
        .header .subtitle {
            font-family: 'Playfair Display', serif;
            color: #5a5a5a;
            margin-top: 6px;
            font-size: 0.9rem;
            font-style: italic;
        }
        
        .upload-section {
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .upload-section h2 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #4a4a4a;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .upload-area {
            border: 1px dashed rgba(152, 216, 200, 0.9);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(152, 216, 200, 0.25);
            margin-bottom: 12px;
        }
        
        .upload-area:hover, .upload-area.dragover {
            border-color: #98D8C8;
            background: rgba(152, 216, 200, 0.4);
        }
        
        .upload-area input { display: none; }
        
        .upload-area .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }
        
        .upload-area p {
            color: #8a7a6a;
            font-size: 0.9rem;
        }
        
        .sticker-upload-area {
            border: 1px dashed rgba(152, 216, 200, 0.9);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(152, 216, 200, 0.2);
        }
        
        .sticker-upload-area:hover, .sticker-upload-area.dragover {
            border-color: #98D8C8;
            background: rgba(152, 216, 200, 0.35);
        }
        
        .sticker-upload-area input { display: none; }
        
        .btn {
            background: linear-gradient(135deg, rgba(184, 149, 110, 0.9), rgba(160, 130, 100, 0.9));
            border: 1px solid rgba(160, 130, 100, 0.3);
            color: white;
            padding: 10px 24px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(184, 149, 110, 0.3);
            width: 100%;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 149, 110, 0.4);
        }
        
        .network-section {
            padding: 15px;
            min-height: 600px;
            position: relative;
        }
        
        .network-section h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #3a5a50;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        #network {
            width: 100%;
            height: 500px;
            border-radius: 16px;
            background: rgba(152, 216, 200, 0.3);
            border: 1px solid rgba(152, 216, 200, 0.5);
            overflow: hidden;
        }
        
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        
        .modal.active { display: flex; }
        
        .modal .image-container {
            max-width: 90%;
            max-height: 90%;
        }
        
        .modal img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .modal.active { display: flex; }
        
        .modal .image-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }
        
        .modal .close-hint {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: #8a7a6a;
            font-size: 0.8rem;
        }
        
        #loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #8a7a6a;
        }
        
        #loading.active { display: block; }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(184, 149, 110, 0.2);
            border-top-color: #b8956e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .page-stickers {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }
        
        .page-sticker {
            position: absolute;
            cursor: move;
            pointer-events: auto;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
            transition: transform 0.1s;
            user-select: none;
        }
        
        .page-sticker:hover {
            transform: scale(1.1);
        }
        
        .page-sticker.dragging {
            cursor: grabbing;
            z-index: 101;
        }
        
        .sticker-controls {
            position: fixed;
            display: none;
            gap: 8px;
            z-index: 200;
        }
        
        .sticker-controls.show {
            display: flex;
        }
        
        .sticker-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .sticker-btn.zoom-in { background: #fff; color: #333; }
        .sticker-btn.zoom-out { background: #fff; color: #333; }
        .sticker-btn.delete { background: #ff6b6b; color: #fff; }
        
        .error-msg {
            color: #d48383;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="bg-image" id="bgImage"></div>
    <div class="bg-pattern"></div>
    
    <div class="page-stickers" id="pageStickers"></div>
    
    <div class="sticker-controls" id="stickerControls">
        <button class="sticker-btn zoom-in" onclick="adjustStickerSize(1.2)">+</button>
        <button class="sticker-btn zoom-out" onclick="adjustStickerSize(0.8)">-</button>
        <button class="sticker-btn delete" onclick="deleteSticker()">×</button>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>观察日记</h1>
            <p class="subtitle">why a raven is like a writing desk</p>
        </div>
        
        <div class="upload-section glass-card" id="uploadSection">
            <h2>上传照片</h2>
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" multiple accept="image/*">
                <span class="icon">📷</span>
                <p>点击选择或拖拽图片到这里</p>
            </div>
            <p class="error-msg" id="photoError"></p>
            
            <h2 style="margin-top: 15px;">上传贴纸</h2>
            <div class="sticker-upload-area" id="stickerUploadArea">
                <input type="file" id="stickerFileInput" multiple accept="image/*">
                <span class="icon">🎀</span>
                <p>点击选择或拖拽贴纸到这里</p>
            </div>
            <p class="error-msg" id="stickerError"></p>
            
            <button class="btn" id="generateBtn">生成网络</button>
            
            <div id="loading">
                <div class="loading-spinner"></div>
                <p>上传中...</p>
            </div>
        </div>
        
        <div class="network-section glass-card">
            <h2>Time Capsule</h2>
            <div id="network"></div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="image-container">
            <img src="" alt="预览">
            <p class="close-hint">点击关闭</p>
        </div>
    </div>

    <script>
        let networkId = new URLSearchParams(window.location.search).get('id');
        let images = [];
        let bgImage = null;
        let customStickers = [];
        let selectedSticker = null;
        
        if (networkId) {
            loadNetwork(networkId);
            document.getElementById('uploadSection').style.display = 'none';
        }
        
        async function initPage() {
            await loadCustomStickers();
        }
        
        async function loadCustomStickers() {
            try {
                const res = await fetch('/api/stickers');
                const data = await res.json();
                if (data.stickers && data.stickers.length > 0) {
                    customStickers = data.stickers;
                    renderCustomStickers();
                }
            } catch (e) {
                console.log('No custom stickers');
            }
        }
        
        function renderCustomStickers() {
            const container = document.getElementById('pageStickers');
            
            customStickers.forEach((sticker, i) => {
                const img = document.createElement('img');
                img.className = 'page-sticker';
                
                let stickerData = sticker;
                let posX, posY, size;
                
                if (typeof sticker === 'object' && sticker.src) {
                    img.src = sticker.src;
                    posX = sticker.x || (3 + Math.random() * 88);
                    posY = sticker.y || (3 + Math.random() * 88);
                    size = sticker.size || 55;
                } else {
                    img.src = sticker;
                    posX = 3 + Math.random() * 88;
                    posY = 3 + Math.random() * 88;
                    size = 55;
                }
                
                img.dataset.index = i;
                img.dataset.size = size;
                img.style.width = size + 'px';
                img.style.left = posX + '%';
                img.style.top = posY + '%';
                img.style.animationDelay = (Math.random() * 3) + 's';
                
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectSticker(img);
                });
                
                makeDraggable(img);
                container.appendChild(img);
            });
        }
        
        function selectSticker(el) {
            if (selectedSticker) {
                selectedSticker.style.outline = 'none';
            }
            selectedSticker = el;
            selectedSticker.style.outline = '2px dashed #8b5cf6';
            
            const controls = document.getElementById('stickerControls');
            controls.classList.add('show');
            
            const rect = el.getBoundingClientRect();
            controls.style.left = (rect.left + rect.width / 2 - 50) + 'px';
            controls.style.top = (rect.top - 45) + 'px';
        }
        
        function adjustStickerSize(factor) {
            if (!selectedSticker) return;
            let currentSize = parseFloat(selectedSticker.dataset.size) || 55;
            let newSize = currentSize * factor;
            if (newSize < 20) newSize = 20;
            if (newSize > 200) newSize = 200;
            selectedSticker.dataset.size = newSize;
            selectedSticker.style.width = newSize + 'px';
            
            const controls = document.getElementById('stickerControls');
            const rect = selectedSticker.getBoundingClientRect();
            controls.style.left = (rect.left + rect.width / 2 - 50) + 'px';
            controls.style.top = (rect.top - 45) + 'px';
        }
        
        function deleteSticker() {
            if (!selectedSticker) return;
            const idx = parseInt(selectedSticker.dataset.index);
            selectedSticker.remove();
            customStickers.splice(idx, 1);
            
            selectedSticker = null;
            document.getElementById('stickerControls').classList.remove('show');
            
            saveStickerPositions();
        }
        
        async function saveStickerPositions() {
            const stickers = [];
            document.querySelectorAll('.page-sticker').forEach(el => {
                const rect = el.getBoundingClientRect();
                const containerRect = document.getElementById('pageStickers').getBoundingClientRect();
                stickers.push({
                    src: el.src,
                    x: ((el.offsetLeft + rect.width/2) / containerRect.width) * 100,
                    y: ((el.offsetTop + rect.height/2) / containerRect.height) * 100,
                    size: parseFloat(el.dataset.size) || 55
                });
            });
            
            try {
                await fetch('/api/stickers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({stickers: stickers})
                });
            } catch (e) {
                console.log('Failed to save stickers');
            }
        }
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.page-sticker') && !e.target.closest('.sticker-controls')) {
                if (selectedSticker) {
                    selectedSticker.style.outline = 'none';
                    selectedSticker = null;
                    document.getElementById('stickerControls').classList.remove('show');
                }
            }
        });
        
        function makeDraggable(el) {
            let isDragging = false;
            let startX, startY, initialX, initialY;
            
            el.addEventListener('mousedown', startDrag);
            el.addEventListener('touchstart', startDrag, {passive: false});
            
            function startDrag(e) {
                e.preventDefault();
                isDragging = true;
                el.classList.add('dragging');
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                startX = clientX;
                startY = clientY;
                initialX = el.offsetLeft;
                initialY = el.offsetTop;
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, {passive: false});
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);
            }
            
            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const dx = clientX - startX;
                const dy = clientY - startY;
                
                el.style.left = (initialX + dx) + 'px';
                el.style.top = (initialY + dy) + 'px';
            }
            
            function stopDrag() {
                isDragging = false;
                el.classList.remove('dragging');
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
                
                saveStickerPositions();
            }
        }
        
        initPage();
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        const stickerUploadArea = document.getElementById('stickerUploadArea');
        const stickerFileInput = document.getElementById('stickerFileInput');
        
        stickerUploadArea.addEventListener('click', () => stickerFileInput.click());
        
        stickerUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            stickerUploadArea.classList.add('dragover');
        });
        
        stickerUploadArea.addEventListener('dragleave', () => {
            stickerUploadArea.classList.remove('dragover');
        });
        
        stickerUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            stickerUploadArea.classList.remove('dragover');
            stickerFileInput.files = e.dataTransfer.files;
            handleStickerUpload(e.dataTransfer.files);
        });
        
        stickerFileInput.addEventListener('change', (e) => handleStickerUpload(e.target.files));
        
        async function handleStickerUpload(files) {
            if (!files.length) return;
            
            const errorEl = document.getElementById('stickerError');
            errorEl.classList.remove('show');
            document.getElementById('loading').classList.add('active');
            
            const formData = new FormData();
            for (let file of files) {
                formData.append('stickers', file);
            }
            
            try {
                const res = await fetch('/api/sticker', { 
                    method: 'POST', 
                    body: formData 
                });
                const data = await res.json();
                
                document.getElementById('loading').classList.remove('active');
                
                if (data.stickers) {
                    customStickers = [...customStickers, ...data.stickers];
                    renderCustomStickers();
                    alert('贴纸上传成功！');
                } else if (data.error) {
                    errorEl.textContent = data.error;
                    errorEl.classList.add('show');
                }
            } catch (err) {
                document.getElementById('loading').classList.remove('active');
                errorEl.textContent = '上传失败，请重试';
                errorEl.classList.add('show');
            }
        }
        
        async function handleFiles(files) {
            if (!files.length) return;
            
            const errorEl = document.getElementById('photoError');
            errorEl.classList.remove('show');
            document.getElementById('loading').classList.add('active');
            
            const formData = new FormData();
            for (let file of files) {
                formData.append('images', file);
            }
            
            if (!networkId) {
                const res = await fetch('/api/network', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: 'My Photo Network'})
                });
                const data = await res.json();
                networkId = data.network_id;
                window.history.pushState({}, '', '?id=' + networkId);
            }
            
            formData.append('network_id', networkId);
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                document.getElementById('loading').classList.remove('active');
                
                if (data.uploaded) {
                    images = [...images, ...data.uploaded];
                    
                    if (!bgImage && data.uploaded.length > 0) {
                        bgImage = data.uploaded[0].data;
                        document.getElementById('bgImage').style.backgroundImage = 'url(' + bgImage + ')';
                    }
                    
                    alert('成功上传 ' + data.uploaded.length + ' 张图片！');
                    refreshNetwork();
                } else if (data.error) {
                    errorEl.textContent = data.error;
                    errorEl.classList.add('show');
                }
            } catch (err) {
                document.getElementById('loading').classList.remove('active');
                errorEl.textContent = '上传失败，请重试';
                errorEl.classList.add('show');
            }
        }
        
        async function refreshNetwork() {
            const res = await fetch('/api/network/' + networkId);
            const data = await res.json();
            if (data.nodes) {
                images = data.nodes;
                if (images.length > 0) {
                    if (!bgImage) {
                        bgImage = images[0].data;
                        document.getElementById('bgImage').style.backgroundImage = 'url(' + bgImage + ')';
                    }
                    generateAndDraw();
                }
            }
        }
        
        document.getElementById('generateBtn').addEventListener('click', generateAndDraw);
        
        function generateAndDraw() {
            if (images.length === 0) {
                refreshNetwork();
                return;
            }
            
            const defaultEmoji = ['🌸', '✨', '💖', '⭐', '🎀', '🌙', '🦋', '💫'];
            const nodesData = images.map((img, i) => ({
                id: img.id,
                image: img.data,
                x: Math.random() * 300 + 80,
                y: Math.random() * 350 + 80,
                rotation: (Math.random() - 0.5) * 10,
                sticker: defaultEmoji[i % defaultEmoji.length]
            }));
            
            const links = [];
            for (let i = 1; i < nodesData.length; i++) {
                const target = Math.floor(Math.random() * i);
                links.push({ source: nodesData[target].id, target: nodesData[i].id });
            }
            
            drawNetwork(nodesData, links);
        }
        
        function drawNetwork(nodesData, linksData) {
            const container = document.getElementById('network');
            container.innerHTML = '';
            
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const svg = d3.select('#network')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            const g = svg.append('g');
            
            svg.call(d3.zoom()
                .scaleExtent([0.5, 2])
                .on('zoom', (event) => g.attr('transform', event.transform)));
            
            const simulation = d3.forceSimulation(nodesData)
                .force('link', d3.forceLink(linksData).id(d => d.id).distance(120))
                .force('charge', d3.forceManyBody().strength(-350))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(55));
            
            const link = g.selectAll('.link')
                .data(linksData)
                .enter().append('line')
                .attr('stroke', 'rgba(160, 130, 100, 0.2)')
                .attr('stroke-width', 1.5);
            
            const defs = svg.append('defs');
            
            nodesData.forEach(node => {
                const pattern = defs.append('pattern')
                    .attr('id', 'pattern-' + node.id)
                    .attr('width', 1)
                    .attr('height', 1)
                    .attr('patternTransform', 'rotate(' + node.rotation + ')');
                
                pattern.append('rect')
                    .attr('width', 90)
                    .attr('height', 90)
                    .attr('fill', '#fffaf5');
                
                const clipId = 'clip-' + node.id;
                const clipPath = defs.append('clipPath')
                    .attr('id', clipId);
                
                clipPath.append('rect')
                    .attr('width', 82)
                    .attr('height', 82)
                    .attr('x', 4)
                    .attr('y', 4);
                
                pattern.append('image')
                    .attr('xlink:href', node.image)
                    .attr('width', 82)
                    .attr('height', 82)
                    .attr('x', 4)
                    .attr('y', 4)
                    .attr('preserveAspectRatio', 'xMidYMid slice')
                    .attr('clip-path', 'url(#' + clipId + ')');
                
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const x = 45 + Math.cos(angle) * 40;
                    const y = 45 + Math.sin(angle) * 40;
                    
                    pattern.append('circle')
                        .attr('cx', x)
                        .attr('cy', y)
                        .attr('r', 2 + Math.random() * 2)
                        .attr('fill', i % 2 === 0 ? '#c9a882' : '#e8d4bc');
                }
                
                pattern.append('rect')
                    .attr('width', 90)
                    .attr('height', 90)
                    .attr('fill', 'none')
                    .attr('stroke', '#a08060')
                    .attr('stroke-width', 5)
                    .attr('rx', 2);
                
                pattern.append('rect')
                    .attr('width', 90)
                    .attr('height', 90)
                    .attr('fill', 'none')
                    .attr('stroke', '#d4c4a8')
                    .attr('stroke-width', 2)
                    .attr('rx', 2);
            });
            
            const node = g.selectAll('.node')
                .data(nodesData)
                .enter().append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            node.append('rect')
                .attr('x', -45)
                .attr('y', -45)
                .attr('width', 90)
                .attr('height', 90)
                .attr('fill', d => 'url(#pattern-' + d.id + ')')
                .attr('filter', 'drop-shadow(0 3px 6px rgba(0,0,0,0.12))')
                .on('click', (event, d) => showModal(d.image))
                .on('mouseover', function(event, d) {
                    d3.select(this)
                        .transition()
                        .duration(150)
                        .attr('transform', 'scale(1.08)');
                })
                .on('mouseout', function(event, d) {
                    d3.select(this)
                        .transition()
                        .duration(150)
                        .attr('transform', 'scale(1)');
                });
            
            node.append('text')
                .attr('x', 0)
                .attr('y', 3)
                .attr('text-anchor', 'middle')
                .attr('font-size', '1.5rem')
                .attr('pointer-events', 'none')
                .text(d => d.sticker);
            
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
            });
            
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        }
        
        async function loadNetwork(id) {
            const res = await fetch('/api/network/' + id);
            if (!res.ok) {
                alert('网络不存在');
                return;
            }
            
            const data = await res.json();
            images = data.nodes || [];
            
            if (images.length > 0) {
                bgImage = images[0].data;
                document.getElementById('bgImage').style.backgroundImage = 'url(' + bgImage + ')';
                generateAndDraw();
            }
        }
        
        function showModal(src) {
            const modal = document.getElementById('modal');
            modal.querySelector('img').src = src;
            modal.classList.add('active');
        }
        
        document.getElementById('modal').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('active');
        });
    </script>
</body>
</html>
