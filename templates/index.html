<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观察日记</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --wood-light: #d4a574;
            --wood-medium: #b8956e;
            --wood-dark: #8b6914;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -1;
        }
        
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            z-index: -1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2937;
            letter-spacing: 2px;
        }
        
        .header .subtitle {
            color: #6b7280;
            margin-top: 8px;
            font-size: 0.95rem;
        }
        
        .upload-section {
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .upload-section h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: rgba(255,255,255,0.5);
        }
        
        .upload-area:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.15);
        }
        
        .upload-area input { display: none; }
        
        .upload-area .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        
        .upload-area p {
            color: #6b7280;
            font-size: 1rem;
        }
        
        .upload-area .hint {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.35);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.5);
        }
        
        .btn.secondary {
            background: linear-gradient(135deg, #10b981, #34d399);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.35);
        }
        
        .btn.secondary:hover {
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.5);
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .network-section {
            padding: 25px;
            min-height: 600px;
            position: relative;
        }
        
        .network-section h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #network {
            width: 100%;
            height: 550px;
            border-radius: 16px;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        
        .modal.active { display: flex; }
        
        .modal .image-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.2);
        }
        
        .modal .close-hint {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        #loading {
            display: none;
            text-align: center;
            padding: 30px;
            color: #6b7280;
        }
        
        #loading.active { display: block; }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .upload-area { padding: 30px; }
            .controls { flex-direction: column; }
            .controls .btn { width: 100%; }
        }
        
        .page-decorations {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }
        
        .page-decorations .sticker {
            position: absolute;
            font-size: 2.5rem;
            animation: floatSticker 4s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }
        
        .page-decorations .sticker:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .page-decorations .sticker:nth-child(2) { top: 20%; right: 8%; animation-delay: 0.5s; font-size: 2rem; }
        .page-decorations .sticker:nth-child(3) { top: 40%; left: 3%; animation-delay: 1s; }
        .page-decorations .sticker:nth-child(4) { top: 60%; right: 5%; animation-delay: 1.5s; font-size: 2.2rem; }
        .page-decorations .sticker:nth-child(5) { top: 80%; left: 8%; animation-delay: 2s; }
        .page-decorations .sticker:nth-child(6) { top: 75%; right: 10%; animation-delay: 2.5s; font-size: 1.8rem; }
        .page-decorations .sticker:nth-child(7) { top: 35%; left: 8%; animation-delay: 3s; font-size: 2rem; }
        .page-decorations .sticker:nth-child(8) { top: 55%; right: 3%; animation-delay: 3.5s; }
        
        @keyframes floatSticker {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        
        .sticker-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .sticker-preview img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="bg-image" id="bgImage"></div>
    <div class="bg-pattern"></div>
    
    <div class="page-decorations" id="pageDecorations">
        <span class="sticker">🌸</span>
        <span class="sticker">✨</span>
        <span class="sticker">💖</span>
        <span class="sticker">⭐</span>
        <span class="sticker">🎀</span>
        <span class="sticker">🌙</span>
        <span class="sticker">💫</span>
        <span class="sticker">🦋</span>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>📷 观察日记</h1>
            <p class="subtitle">记录美好瞬间 · 分享温暖时刻</p>
        </div>
        
        <div class="upload-section glass-card" id="uploadSection">
            <h2>🌟 上传照片</h2>
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" multiple accept="image/*">
                <span class="icon">📸</span>
                <p>点击选择图片或拖拽到这里</p>
                <p class="hint">支持 PNG, JPG, GIF, WebP 格式</p>
            </div>
            <div class="controls">
                <button class="btn" id="uploadBtn">上传照片</button>
                <button class="btn secondary" id="generateBtn">✨ 生成网络</button>
            </div>
            
            <div id="loading">
                <div class="loading-spinner"></div>
                <p>上传中，请稍候...</p>
            </div>
        </div>
        
        <div class="network-section glass-card">
            <h2>🎨 捕梦网</h2>
            <div id="network"></div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="image-container">
            <img src="" alt="预览">
            <p class="close-hint">点击任意位置关闭</p>
        </div>
    </div>

    <script>
        let networkId = new URLSearchParams(window.location.search).get('id');
        let images = [];
        let bgImage = null;
        
        const defaultStickers = ['🌸', '✨', '💖', '⭐', '🎀', '🌙', '💫', '🦋', '🌻', '🍀', '🦄', '🎨'];
        
        if (networkId) {
            loadNetwork(networkId);
            document.getElementById('uploadSection').style.display = 'none';
        }
        
        function updateDecorations() {
            const container = document.getElementById('pageDecorations');
            const stickers = container.querySelectorAll('.sticker');
            stickers.forEach((sticker, i) => {
                sticker.textContent = defaultStickers[i % defaultStickers.length];
            });
        }
        updateDecorations();
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#8b5cf6';
            uploadArea.style.background = 'rgba(139, 92, 246, 0.12)';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#d1d5db';
            uploadArea.style.background = 'rgba(255,255,255,0.5)';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#d1d5db';
            uploadArea.style.background = 'rgba(255,255,255,0.5)';
            fileInput.files = e.dataTransfer.files;
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        async function handleFiles(files) {
            if (!files.length) return;
            
            document.getElementById('loading').classList.add('active');
            
            const formData = new FormData();
            for (let file of files) {
                formData.append('images', file);
            }
            
            if (!networkId) {
                const res = await fetch('/api/network', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: 'My Photo Network'})
                });
                const data = await res.json();
                networkId = data.network_id;
                window.history.pushState({}, '', `/?id=${networkId}`);
            }
            
            formData.append('network_id', networkId);
            
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            document.getElementById('loading').classList.remove('active');
            
            if (data.uploaded) {
                images = [...images, ...data.uploaded];
                
                if (!bgImage && data.uploaded.length > 0) {
                    bgImage = data.uploaded[0].data;
                    document.getElementById('bgImage').style.backgroundImage = `url(${bgImage})`;
                }
                
                alert(`✨ 成功上传 ${data.uploaded.length} 张图片！`);
                refreshNetwork();
            }
        }
        
        async function refreshNetwork() {
            const res = await fetch(`/api/network/${networkId}`);
            const data = await res.json();
            if (data.nodes) {
                images = data.nodes;
                if (images.length > 0) {
                    if (!bgImage) {
                        bgImage = images[0].data;
                        document.getElementById('bgImage').style.backgroundImage = `url(${bgImage})`;
                    }
                    generateAndDraw();
                }
            }
        }
        
        document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());
        
        document.getElementById('generateBtn').addEventListener('click', generateAndDraw);
        
        function generateAndDraw() {
            if (images.length === 0) {
                refreshNetwork();
                return;
            }
            
            const nodesData = images.map((img, i) => ({
                id: img.id,
                image: img.data,
                x: Math.random() * 800 + 100,
                y: Math.random() * 500 + 50,
                rotation: (Math.random() - 0.5) * 15,
                sticker: defaultStickers[i % defaultStickers.length]
            }));
            
            const links = [];
            for (let i = 1; i < nodesData.length; i++) {
                const target = Math.floor(Math.random() * i);
                links.push({ source: nodesData[target].id, target: nodesData[i].id });
            }
            
            drawNetwork(nodesData, links);
        }
        
        function drawNetwork(nodesData, linksData) {
            const container = document.getElementById('network');
            container.innerHTML = '';
            
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const svg = d3.select('#network')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            const g = svg.append('g');
            
            svg.call(d3.zoom()
                .scaleExtent([0.3, 3])
                .on('zoom', (event) => g.attr('transform', event.transform)));
            
            const simulation = d3.forceSimulation(nodesData)
                .force('link', d3.forceLink(linksData).id(d => d.id).distance(200))
                .force('charge', d3.forceManyBody().strength(-500))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(70));
            
            const link = g.selectAll('.link')
                .data(linksData)
                .enter().append('line')
                .attr('class', 'link')
                .attr('stroke', 'rgba(139, 92, 246, 0.25)')
                .attr('stroke-width', 2);
            
            const defs = svg.append('defs');
            
            nodesData.forEach(node => {
                const pattern = defs.append('pattern')
                    .attr('id', `pattern-${node.id}`)
                    .attr('width', 1)
                    .attr('height', 1)
                    .attr('patternTransform', `rotate(${node.rotation})`);
                
                pattern.append('rect')
                    .attr('width', 120)
                    .attr('height', 120)
                    .attr('fill', '#fff8f0');
                
                const clipPath = defs.append('clipPath')
                    .attr('id', `clip-${node.id}`);
                
                clipPath.append('rect')
                    .attr('width', 110)
                    .attr('height', 110)
                    .attr('x', 5)
                    .attr('y', 5);
                
                pattern.append('image')
                    .attr('xlink:href', node.image)
                    .attr('width', 110)
                    .attr('height', 110)
                    .attr('x', 5)
                    .attr('y', 5)
                    .attr('preserveAspectRatio', 'xMidYMid slice')
                    .attr('clip-path', `url(#clip-${node.id})`);
                
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const x = 60 + Math.cos(angle) * 55;
                    const y = 60 + Math.sin(angle) * 55;
                    const size = 3 + Math.random() * 4;
                    
                    pattern.append('circle')
                        .attr('cx', x)
                        .attr('cy', y)
                        .attr('r', size)
                        .attr('fill', i % 2 === 0 ? '#b8956e' : '#d4a574');
                }
                
                pattern.append('rect')
                    .attr('width', 120)
                    .attr('height', 120)
                    .attr('fill', 'none')
                    .attr('stroke', '#8b6914')
                    .attr('stroke-width', 8)
                    .attr('rx', 2);
                
                pattern.append('rect')
                    .attr('width', 120)
                    .attr('height', 120)
                    .attr('fill', 'none')
                    .attr('stroke', '#d4a574')
                    .attr('stroke-width', 3)
                    .attr('rx', 2);
            });
            
            const node = g.selectAll('.node')
                .data(nodesData)
                .enter().append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            node.append('rect')
                .attr('x', -60)
                .attr('y', -60)
                .attr('width', 120)
                .attr('height', 120)
                .attr('fill', d => `url(#pattern-${d.id})`)
                .attr('filter', 'drop-shadow(0 4px 8px rgba(0,0,0,0.2))')
                .on('click', (event, d) => showModal(d.image))
                .on('mouseover', function(event, d) {
                    d3.select(this)
                        .transition()
                        .duration(200)
                        .attr('transform', 'scale(1.1)');
                })
                .on('mouseout', function(event, d) {
                    d3.select(this)
                        .transition()
                        .duration(200)
                        .attr('transform', 'scale(1)');
                });
            
            node.append('text')
                .attr('x', 0)
                .attr('y', 5)
                .attr('text-anchor', 'middle')
                .attr('font-size', '2rem')
                .attr('pointer-events', 'none')
                .text(d => d.sticker);
            
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        }
        
        async function loadNetwork(id) {
            const res = await fetch(`/api/network/${id}`);
            if (!res.ok) {
                alert('网络不存在');
                return;
            }
            
            const data = await res.json();
            images = data.nodes || [];
            
            if (images.length > 0) {
                bgImage = images[0].data;
                document.getElementById('bgImage').style.backgroundImage = `url(${bgImage})`;
                generateAndDraw();
            }
        }
        
        function showModal(src) {
            const modal = document.getElementById('modal');
            modal.querySelector('img').src = src;
            modal.classList.add('active');
        }
        
        document.getElementById('modal').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('active');
        });
    </script>
</body>
</html>
